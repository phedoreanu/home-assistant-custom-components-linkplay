name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    steps:
      - name: Check out code from GitHub
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Verify tag matches manifest version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          manifest=$(python -c "import json; print(json.load(open('custom_components/linkplay/manifest.json'))['version'])")
          if [ "$tag" != "$manifest" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match manifest version $manifest"
            exit 1
          fi
          echo "Tag and manifest agree on $manifest"

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          prev=$(git describe --tags --abbrev=0 "${tag}^" 2>/dev/null || true)
          if [ -n "$prev" ]; then
            {
              git log --pretty='- %s' "${prev}..${tag}"
              echo
              echo "**Full diff:** https://github.com/${GITHUB_REPOSITORY}/compare/${prev}...${tag}"
            } > release-notes.md
            gh release create "$tag" --title "$tag" --notes-file release-notes.md
          else
            gh release create "$tag" --title "$tag" --generate-notes
          fi
